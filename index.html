<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eylül'e Özel 🧸❤️</title>
    <!-- Konfeti efekti için gerekli kütüphane -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* Genel Sayfa Tasarımı (Başlangıçta Havalı Chrome Dark Teması) */
        body {
            margin: 0;
            padding: 0;
            background: #202124; /* Chrome Dark Mode Arka Planı */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            transition: background 1s ease; /* Pembe temaya yumuşak geçiş için */
        }

        /* Başlık Alanları */
        h1 {
            color: #ffffff;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            text-align: center;
            z-index: 10;
        }

        p {
            color: #9aa0a6; /* Chrome gri yazı rengi */
            font-size: 1.2rem;
            margin-bottom: 20px;
            font-weight: bold;
            z-index: 10;
            text-align: center;
        }

        /* XOX Oyun Tahtası Alanı */
        .game-container {
            background: #292a2d; /* Chrome daha koyu panel rengi */
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 3px solid #3c4043;
            z-index: 10;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
        }

        .cell {
            background-color: #35363a;
            border: 2px solid #5f6368;
            border-radius: 15px;
            font-size: 2.5rem;
            font-weight: bold;
            color: #8ab4f8; /* Havalı Chrome Mavisi */
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }

        .cell:hover {
            background-color: #4f5357;
            transform: scale(1.05);
        }

        .cell.x { color: #f28b82; }
        .cell.o { color: #8ab4f8; }
        .cell.x, .cell.o { cursor: not-allowed; }

        /* Özür Ekranı Alanı (Başlangıçta Gizli) */
        #sorry-stage {
            display: none;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(255, 71, 126, 0.4);
            border: 4px dashed #ff477e;
            text-align: center;
            max-width: 500px;
            z-index: 20;
            animation: popUp 0.5s ease-out;
        }

        /* Butonlar */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 25px;
            align-items: center;
        }

        .btn {
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            width: 80%;
        }

        .btn-yes { background-color: #2ec4b6; color: white; }
        .btn-yes:hover { background-color: #23a69a; transform: scale(1.05); }
        .btn-no { background-color: #e63946; color: white; }
        .btn-no:hover { background-color: #d62828; transform: scale(1.05); }

        /* BRAVOOO Ara Ekranı (Başlangıçta Gizli) */
        #bravo-stage {
            display: none;
            text-align: center;
            z-index: 30;
            animation: popUp 0.4s ease-out;
        }

        .bravo-text {
            font-size: 4rem;
            font-weight: 900;
            color: #8ab4f8;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            margin: 0;
            animation: pulse 0.5s infinite alternate;
        }

        /* YUPPIIIII En Son Ekran (Başlangıçta Gizli) */
        #success-stage {
            display: none;
            text-align: center;
            z-index: 30;
            animation: popUp 0.5s ease-out;
        }

        .yuppi-text {
            font-size: 5rem;
            font-weight: 900;
            color: #ff477e;
            text-shadow: 3px 3px 0px #fff, 6px 6px 0px #ffb3c1;
            margin: 0;
            animation: pulse 1s infinite alternate;
        }

        @keyframes popUp {
            0% { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        /* --- GERÇEKÇİ/DOĞAL AYICIK VE KALP ANİMASYONLARI --- */
        .falling-teddy {
            position: absolute;
            font-size: 3rem;
            z-index: 2;
            user-select: none;
            pointer-events: none; /* Oyuna tıklamayı engellemesin diye */
            animation: fallDown 6s linear infinite;
            top: -50px;
        }

        .floating-element {
            position: absolute;
            z-index: 2;
            user-select: none;
            pointer-events: none;
            animation: floatUp 5s linear infinite;
            bottom: -50px;
        }

        @keyframes fallDown {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% {
                transform: translateY(105vh) rotate(360deg);
                opacity: 0;
            }
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% {
                transform: translateY(-105vh) rotate(-360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <!-- Dinamik Efektlerin Toplanacağı Alan (JavaScript ile doldurulacak) -->
    <div id="effect-container"></div>

    <!-- 1. AŞAMA: OYUN EKRANI -->
    <div id="game-stage" style="text-align: center; display: flex; flex-direction: column; align-items: center;">
        <h1 id="main-title">Dünyanın en boklusu hosgeldin 💩🥰</h1>
        <p id="sub-title">Sana kendimi affettirmem gerekiyor ama ondan once bu oyunu oynayıp beni yenmen gerekiyor osuruklu 🧸💨</p>
        <div class="game-container">
            <div class="board" id="board">
                <div class="cell" data-cell></div>
                <div class="cell" data-cell></div>
                <div class="cell" data-cell></div>
                <div class="cell" data-cell></div>
                <div class="cell" data-cell></div>
                <div class="cell" data-cell></div>
                <div class="cell" data-cell></div>
                <div class="cell" data-cell></div>
                <div class="cell" data-cell></div>
            </div>
        </div>
    </div>

    <!-- ARA AŞAMA: BRAVOOO SÜRESİ -->
    <div id="bravo-stage">
        <p class="bravo-text">BRAVOOO ASKIMMMMMMMMM 🎉🥳</p>
    </div>

    <!-- 2. AŞAMA: ÖZÜR EKRANI -->
    <div id="sorry-stage">
        <h2 style="color: #ff477e; font-size: 1.8rem; margin-top: 0;">Özür dilerim aşkım senden habersiz dışarı çıktığım için beni affeder misin? 🥺👉👈</h2>
        <div class="btn-container">
            <button class="btn btn-yes" onclick="selectYes()">evet ben askimi seviyom hala</button>
            <button class="btn btn-no" onclick="selectNo()">yok ben sevmiyom artik</button>
        </div>
    </div>

    <!-- 3. AŞAMA: KAZANMA/YUPPİ EKRANI -->
    <div id="success-stage">
        <p class="yuppi-text">YUPPIIIII 🎉</p>
        <h2 style="color: #ff477e; font-size: 2rem; margin-top: 20px;">Seni Çok Seviyorum! ❤️🧸</h2>
    </div>

    <script>
        const X_CLASS = 'x';
        const O_CLASS = 'o';
        const WINNING_COMBINATIONS = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        const cellElements = document.querySelectorAll('[data-cell]');
        const gameStage = document.getElementById('game-stage');
        const bravoStage = document.getElementById('bravo-stage');
        const sorryStage = document.getElementById('sorry-stage');
        const successStage = document.getElementById('success-stage');
        const effectContainer = document.getElementById('effect-container');
        
        let oTurn = false;
        let confettiInterval;
        let currentStage = 'game'; // 'game' veya 'sorry'

        startGame();

        function startGame() {
            oTurn = false;
            currentStage = 'game';
            
            // İlk temayı siyah Chrome teması yap
            document.body.style.background = "#202124";
            document.getElementById('main-title').style.color = "#ffffff";
            document.getElementById('sub-title').style.color = "#9aa0a6";
            
            gameStage.style.display = 'flex';
            bravoStage.style.display = 'none';
            sorryStage.style.display = 'none';
            successStage.style.display = 'none';
            
            // Efektleri baştan yarat (Siyah temada yukarıdan ayıcıklar düşecek)
            createEffects();

            cellElements.forEach(cell => {
                cell.classList.remove(X_CLASS);
                cell.classList.remove(O_CLASS);
                cell.innerText = '';
                cell.removeEventListener('click', handleClick);
                cell.addEventListener('click', handleClick, { once: true });
            });
        }

        // --- DOĞAL VE GERÇEKÇİ EFEKT OLUŞTURUCU ---
        function createEffects() {
            effectContainer.innerHTML = ''; // Temizle
            
            if (currentStage === 'game') {
                // Siyah temada ekrana rastgele dağılmış, yukarıdan düşen 15 adet ayıcık
                for (let i = 0; i < 15; i++) {
                    const teddy = document.createElement('div');
                    teddy.className = 'falling-teddy';
                    teddy.innerText = '🧸';
                    teddy.style.left = `${Math.random() * 95}%`;
                    teddy.style.animationDelay = `${Math.random() * 5}s`;
                    teddy.style.animationDuration = `${4 + Math.random() * 4}s`; // Farklı hızlar
                    teddy.style.fontSize = `${2 + Math.random() * 2.5}rem`; // Farklı boyutlar
                    effectContainer.appendChild(teddy);
                }
            } else if (currentStage === 'sorry') {
                // Pembe temada aşağıdan yukarıya uçuşan ayıcıklar ve kalpler karışık
                const elements = ['🧸', '❤️', '💖', '💕', '💗'];
                for (let i = 0; i < 25; i++) {
                    const el = document.createElement('div');
                    el.className = 'floating-element';
                    el.innerText = elements[Math.floor(Math.random() * elements.length)];
                    el.style.left = `${Math.random() * 95}%`;
                    el.style.animationDelay = `${Math.random() * 5}s`;
                    el.style.animationDuration = `${3 + Math.random() * 4}s`;
                    el.style.fontSize = `${1.5 + Math.random() * 2.5}rem`;
                    effectContainer.appendChild(el);
                }
            }
        }

        function handleClick(e) {
            const cell = e.target;
            if (cell.classList.contains(X_CLASS) || cell.classList.contains(O_CLASS) || oTurn) return;

            placeMark(cell, 'X', X_CLASS);

            if (checkWin(X_CLASS)) {
                handleWinTransition();
            } else if (isDraw()) {
                alert("Beraberlik! Ayıcıklar seni engelledi, tekrar dene boklu! 🧸💩");
                startGame();
            } else {
                oTurn = true;
                setTimeout(aiMove, 500);
            }
        }

        function placeMark(cell, text, currentClass) {
            cell.classList.add(currentClass);
            cell.innerText = text;
        }

        function checkWin(currentClass) {
            return WINNING_COMBINATIONS.some(combination => {
                return combination.every(index => {
                    return cellElements[index].classList.contains(currentClass);
                });
            });
        }

        function isDraw() {
            return [...cellElements].every(cell => {
                return cell.classList.contains(X_CLASS) || cell.classList.contains(O_CLASS);
            });
        }

        function handleWinTransition() {
            gameStage.style.display = 'none'; 
            bravoStage.style.display = 'block'; 
            
            startConfettiLoop();

            setTimeout(() => {
                stopConfettiLoop();
                bravoStage.style.display = 'none';
                currentStage = 'sorry';
                
                // Pembe temaya geçiş
                document.body.style.background = "linear-gradient(135deg, #ffe5ec, #ffc2d1)";
                createEffects(); // Aşağıdan yukarıya kalpli ayıcıklı uçuşmayı başlat
                sorryStage.style.display = 'block'; 
            }, 3000);
        }

        function startConfettiLoop() {
            confettiInterval = setInterval(() => {
                confetti({ particleCount: 7, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 7, angle: 120, spread: 55, origin: { x: 1 } });
            }, 150);
        }

        function stopConfettiLoop() {
            clearInterval(confettiInterval);
        }

        function selectNo() {
            alert("Hataaa! Yanlış şıkkı seçtin aşkım, ceza olarak tekrar oynuyorsun! 😜💩");
            startGame();
        }

        function selectYes() {
            sorryStage.style.display = 'none';
            successStage.style.display = 'block';
            
            var duration = 6 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 } });
                if (Date.now() < end) { requestAnimationFrame(frame); }
            }());
        }

        // Yapay Zeka Mekanizması
        function aiMove() {
            if (!oTurn) return;
            let move = -1;

            move = findBestMove(O_CLASS);
            if (move === -1) move = findBestMove(X_CLASS);
            if (move === -1 && !cellElements[4].classList.contains(X_CLASS) && !cellElements[4].classList.contains(O_CLASS)) move = 4;

            if (move === -1) {
                const availableMoves = [];
                cellElements.forEach((cell, index) => {
                    if (!cell.classList.contains(X_CLASS) && !cell.classList.contains(O_CLASS)) availableMoves.push(index);
                });
                if (availableMoves.length > 0) move = availableMoves[Math.floor(Math.random() * availableMoves.length)];
            }

            if (move !== -1) {
                const targetCell = cellElements[move];
                placeMark(targetCell, 'O', O_CLASS);
                targetCell.removeEventListener('click', handleClick);

                if (checkWin(O_CLASS)) {
                    alert("Ayıcıklar kazandı! 🧸 Tekrar dene, affetmek için beni yenmelisin boklu!");
                    startGame();
                } else if (isDraw()) {
                    alert("Beraberlik! Tekrar dene! 🧸");
                    startGame();
                } else {
                    oTurn = false;
                }
            }
        }

        function findBestMove(currentClass) {
            for (let combination of WINNING_COMBINATIONS) {
                let count = 0;
                let emptyIndex = -1;
                for (let index of combination) {
                    if (cellElements[index].classList.contains(currentClass)) count++;
                    else if (!cellElements[index].classList.contains(X_CLASS) && !cellElements[index].classList.contains(O_CLASS)) emptyIndex = index;
                }
                if (count === 2 && emptyIndex !== -1) return emptyIndex;
            }
            return -1;
        }
    </script>
</body>
</html>
